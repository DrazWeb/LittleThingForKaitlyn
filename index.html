<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Just to Make Your Day</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #fceabb, #f8b500);
        font-family: 'Arial', sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: #fff;
        text-align: center;
    }

    h1 {
        font-size: 2.2em;
        margin-bottom: 40px;
        text-shadow: 2px 2px 5px rgba(0,0,0,0.2);
    }

    button {
        background-color: #ff4d6d;
        border: none;
        padding: 15px 30px;
        font-size: 1.1em;
        cursor: pointer;
        border-radius: 50px;
        color: #fff;
        transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    button:hover {
        transform: scale(1.1);
        box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    /* Popup effet surprise */
    #popup {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background-color: #fff;
        color: #333;
        padding: 30px 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        z-index: 1000;
        text-align: center;
    }

    #popup a {
        display: inline-block;
        margin-top: 20px;
        padding: 10px 20px;
        background-color: #ff4d6d;
        color: #fff;
        border-radius: 10px;
        text-decoration: none;
        transition: background-color 0.2s;
    }

    #popup a:hover {
        background-color: #ff1a4d;
    }

    #popup button {
        margin-top: 15px;
        padding: 8px 15px;
        border: none;
        background: #ccc;
        border-radius: 8px;
        cursor: pointer;
    }

</style>
</head>
<body>

<h1>Just to make your day a little better 😊</h1>
<button id="surpriseBtn">Little surprise if you click here</button>

<div id="popup">
    <h2>Surprise! 🎉</h2>
    <p>Click below to download the game I made today!</p>
    <a href="https://drive.google.com/drive/folders/1L9Ur_RNk2zyyNdsXnlXGxzEih6Pau7Ic?usp=sharing" target="_blank">Download Now</a>
    <br>
    <button id="closePopup">Close</button>
</div>

<script>
    const button = document.getElementById('surpriseBtn');
    const popup = document.getElementById('popup');
    const closeBtn = document.getElementById('closePopup');

    button.addEventListener('click', () => {
        popup.style.display = 'block';
    });

    closeBtn.addEventListener('click', () => {
        popup.style.display = 'none';
    });
</script>

</body>
</html>
